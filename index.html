<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK Barreto Comunica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-dark: #0a6b5e;
    --teal: #1a9a85;
    --teal-mid: #2bb8a0;
    --teal-light: #a8e6dc;
    --sage: #7aab8a;
    --sage-light: #c8dfc6;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 100vh;
  }

  /* ── FUNDO ── */
  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,
      #c8dfc6 0%,
      #7aab8a 22%,
      #2bb8a0 50%,
      #0a6b5e 78%,
      #065048 100%
    );
    background-size: 300% 300%;
    animation: gradientShift 12s ease infinite;
    z-index: 0;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── CONTEÚDO CENTRAL ── */
  .center {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }

  /* ── LOGO BOX ── */
  .logo-box {
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(10,107,94,0.25);
    animation: logoIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .logo-inner {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--teal);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .logo-kk {
    font-size: 28px;
    font-weight: 700;
    color: var(--teal-dark);
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-sub {
    font-size: 5.5px;
    font-weight: 500;
    color: var(--teal);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
  }

  /* ── FRASE ── */
  .phrase-wrap {
    text-align: center;
    animation: fadeIn 0.6s ease 0.5s both;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phrase {
    font-size: clamp(15px, 3.5vw, 18px);
    font-weight: 300;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.3px;
    line-height: 1.5;
    transition: opacity 0.4s ease;
  }

  .phrase.fade-out { opacity: 0; }

  /* ── BARRA DE PROGRESSO ── */
  .progress-wrap {
    width: min(340px, 80vw);
    animation: fadeIn 0.6s ease 0.7s both;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: white;
    border-radius: 99px;
    transition: width 0.25s ease;
    position: relative;
  }

  .progress-bar::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 40px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
    border-radius: 99px;
  }

  .progress-pct {
    text-align: right;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* ── FOOTER ── */
  .footer {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    text-align: center;
    width: 100%;
    animation: fadeIn 0.6s ease 1s both;
    letter-spacing: 0.3px;
  }

  .footer strong {
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }

  /* ── SAÍDA ── */
  body.exit {
    animation: exitAnim 0.6s ease forwards;
  }

  @keyframes exitAnim {
    to { opacity: 0; transform: scale(1.04); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="center">
  <div class="logo-box">
    <div class="logo-inner">
      <span class="logo-kk">KK</span>
      <span class="logo-sub">KKBARRETO<br>COMUNICAÇÃO E EVENTOS</span>
    </div>
  </div>

  <div class="phrase-wrap">
    <p class="phrase" id="phrase"></p>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-bar" id="bar"></div>
    </div>
    <p class="progress-pct" id="pct">0%</p>
  </div>
</div>

<!-- <p class="footer">Desenvolvido por <strong>Chibo Developer</strong> | 2025</p> -->

<script>
  const phrases = [
    "Organizando a papelada para você...",
    "Afiando o lápis vermelho do editor...",
    "Ligando para a assessoria de imprensa...",
    "Calibrando o feed antes de postar...",
    "Escolhendo o filtro perfeito da campanha...",
    "Checando as métricas de ontem...",
    "Agendando o conteúdo da semana...",
    "Preparando a pauta do mês...",
    "Dando aquele último ajuste no copy...",
    "Ajustando o tom de voz da marca...",
    "Monitorando o que estão falando de você...",
    "Transformando ideias em resultados...",
    "Alinhando estratégia com criatividade...",
    "Conferindo o briefing mais uma vez...",
    "Deixando a sua presença digital impecável...",
    "Colocando a sua marca no lugar certo...",
    "Preparando histórias que o seu público vai amar...",
  ];

  const phrase = document.getElementById('phrase');
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');

  // Escolhe frase aleatória
  phrase.textContent = phrases[Math.floor(Math.random() * phrases.length)];

  // Progresso funcional
  let progress = 0;
  const duration = 2800;
  const interval = 40;
  const steps = duration / interval;
  const increment = 100 / steps;

  // Easing — começa rápido, desacelera no fim
  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  let step = 0;
  const timer = setInterval(() => {
    step++;
    const raw = step / steps;
    progress = Math.min(easeOut(raw) * 100, 100);
    bar.style.width = progress + '%';
    pct.textContent = Math.round(progress) + '%';

    if (progress >= 100) {
      clearInterval(timer);
      setTimeout(() => {
        document.body.classList.add('exit');
        setTimeout(() => {
          window.location.href = 'kk-barreto.html';
        }, 600);
      }, 300);
    }
  }, interval);
</script>
</body>
</html>
